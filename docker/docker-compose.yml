services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: mspro-ltd
      POSTGRES_PASSWORD: mspro-ltd
      POSTGRES_DB: mspro-ltd
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mspro-ltd -d mspro-ltd"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://mspro-ltd:mspro-ltd@db:5432/mspro-ltd
      PORT: "3100"
      SERVE_UI: "true"
      MSPROLTD_DEPLOYMENT_MODE: "authenticated"
      MSPROLTD_DEPLOYMENT_EXPOSURE: "private"
      MSPROLTD_PUBLIC_URL: "${MSPROLTD_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - mspro-ltd-data:/mspro-ltd
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  mspro-ltd-data:
