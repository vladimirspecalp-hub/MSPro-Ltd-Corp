services:
  mspro-ltd:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "${MSPROLTD_PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      MSPROLTD_HOME: "/mspro-ltd"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      MSPROLTD_DEPLOYMENT_MODE: "authenticated"
      MSPROLTD_DEPLOYMENT_EXPOSURE: "private"
      MSPROLTD_PUBLIC_URL: "${MSPROLTD_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - "${MSPROLTD_DATA_DIR:-../data/docker-mspro-ltd}:/mspro-ltd"
